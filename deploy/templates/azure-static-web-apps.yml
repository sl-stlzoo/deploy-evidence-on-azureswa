# Generated by deploy/scripts/03-configure-swa.ps1
# Commit this file to .github/workflows/ to enable automated deployments.
# Required GitHub secret: AZURE_STATIC_WEB_APPS_API_TOKEN
#   Set it in GitHub → Settings → Secrets and variables → Actions
#   Value: the SWA_DEPLOYMENT_TOKEN from your .env file.

name: Azure Static Web Apps — Evidence.dev

on:
  push:
    branches:
      - %%GITHUB_BRANCH%%
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - %%GITHUB_BRANCH%%

jobs:
  build_and_deploy:
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build and Deploy to Azure SWA
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          api_location: api
          output_location: build
          app_build_command: npm run build
        env:
          NODE_VERSION: '20'

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR Environment
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
